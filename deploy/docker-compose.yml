# manga-utils + FlareSolverr, side by side.
#
#   Build & run locally:   docker compose -f deploy/docker-compose.yml up -d --build
#   Run a published image: set `image:` below, remove the `build:` block, then `up -d` (pull).
#
# FlareSolverr is auto-wired via MU_FLARESOLVERR_URL below — no first-run Settings step, and it
# survives restoring a backup from another machine. The web UI is meant to be reached over
# Tailscale — expose it only where you trust the network.

services:
  manga-utils:
    image: nake1/manga-utils:latest           # pulled from Docker Hub (so `curl … | docker compose -f - up -d` works)
    # Building locally instead of pulling? Run:
    #   docker build -f deploy/Dockerfile -t nake1/manga-utils:latest .
    # then `docker compose up -d` uses your freshly-built image.
    container_name: manga-utils
    hostname: manga-utils                      # stable so Chromium's profile-singleton lock matches across restarts
    ports:
      - "8080:8080"                            # host:container. This is the "preset port" — no dialog needed.
    # --- Proxmox: put ONLY downloads on a big/second drive, keep config on the boot drive ------
    #   Config (library.db, extensions, settings, JCEF native) stays in the mu-data named volume,
    #   which Docker keeps on the boot drive. The app writes downloads to /data/downloads by
    #   default, so bind-mounting the extra drive there redirects just the big stuff — no app
    #   setting to change. IMPORTANT: chown the host dir to the container user first:
    #       sudo chown -R 1000:1000 /mnt/manga-downloads
    # --- DYNO Phase 0: back up library + downloads to a USB drive ------------------------------
    #   Mount the USB on the HOST (fstab/udev), then bind-mount it in at /dyno. The container stays
    #   non-root & unprivileged — it only writes files. The host dir must be writable by UID 1000:
    #       sudo mount -o uid=1000,gid=1000 /dev/sdX1 /mnt/usb     # or chown -R 1000:1000 /mnt/usb
    #   exFAT is the safe cross-platform choice. Then hit "Back up to USB" in Settings.
    volumes:
      - mu-data:/data
      # - /mnt/manga-downloads:/data/downloads   # <- uncomment on Proxmox; point at the extra drive's mount
      # - /mnt/usb:/dyno                          # <- uncomment to enable USB backup; host mount of the drive
    shm_size: "1gb"                            # Chromium (JCEF) needs a roomy /dev/shm
    environment:
      - MANGA_WEB_PORT=8080
      - MU_FLARESOLVERR_URL=http://flaresolverr:8191   # always wins over Settings/backup → zero first-run config
      - MU_DYNO_DIR=/dyno                              # where "Back up to USB" writes (matches the bind mount above)
    depends_on:
      - flaresolverr
    restart: unless-stopped
    # --- Proxmox/Linux only: zero port config (binds the host's 8080 directly, no -p needed).
    #   If you enable this, remove the ports: block above, and set the FlareSolverr URL to
    #   http://localhost:8191 (host networking flattens the compose network).
    # network_mode: host

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
    shm_size: "1gb"                            # its own headless Chrome
    # No published port needed — manga-utils reaches it in-network at http://flaresolverr:8191
    restart: unless-stopped

  # Watchdog: `restart: unless-stopped` already recovers a crash (process exit). autoheal covers the
  # other case — a container that's *running but hung* — by restarting anything the healthcheck marks
  # unhealthy (manga-utils pings /api/version; flaresolverr has its own healthcheck).
  autoheal:
    image: willfarrell/autoheal:latest
    container_name: autoheal
    restart: unless-stopped
    environment:
      - AUTOHEAL_CONTAINER_LABEL=all           # watch every container that has a healthcheck
      - AUTOHEAL_INTERVAL=15                    # check every 15s
      - AUTOHEAL_START_PERIOD=60                # give a just-restarted container time to boot
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  mu-data:
