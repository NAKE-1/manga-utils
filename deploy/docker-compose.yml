# manga-utils + FlareSolverr, side by side.
#
#   Build & run locally:   docker compose -f deploy/docker-compose.yml up -d --build
#   Or pull the published image (set `image:` below, comment out `build:`).
#
# First run: open http://<host>:8080 → Settings → set the FlareSolverr URL to
#   http://flaresolverr:8191   (the sibling container; it persists in the /data volume).
# The web UI is meant to be reached over Tailscale — bind/expose only where you trust the network.

services:
  manga-utils:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: ghcr.io/OWNER/manga-utils:latest   # <- replace OWNER; used when you `docker compose pull`
    container_name: manga-utils
    hostname: manga-utils                      # stable so Chromium's profile-singleton lock matches across restarts
    ports:
      - "8080:8080"
    volumes:
      - mu-data:/data                          # library, extensions, settings, downloads, JCEF native
    shm_size: "1gb"                            # Chromium (JCEF) needs a roomy /dev/shm
    environment:
      - MANGA_WEB_PORT=8080
    depends_on:
      - flaresolverr
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
    shm_size: "1gb"                            # its own headless Chrome
    # No published port needed — manga-utils reaches it in-network at http://flaresolverr:8191
    restart: unless-stopped

volumes:
  mu-data:
