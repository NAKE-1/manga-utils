<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>manga-utils</title>
    <style>
      :root { color-scheme: dark; }
      body { margin: 0; background: #0e0e10; color: #e7e7ea; font-family: system-ui, sans-serif; }
      .wrap { max-width: 560px; margin: 0 auto; padding: 28px 18px; }
      h1 { font-size: 22px; }
      .accent { color: #8a7cf0; }
      code { background: #1a1a1e; padding: 2px 6px; border-radius: 6px; }
      a { color: #8a7cf0; }
      .ok { color: #4cd07d; }
      .err { color: #ff6b6b; }
      ul.sources { list-style: none; padding: 0; margin: 12px 0 0; }
      ul.sources li { display:flex; align-items:center; gap:10px; background:#17171a; border:1px solid #26262b;
        border-radius:12px; padding:12px 14px; margin-bottom:8px; }
      ul.sources .name { font-weight:600; }
      ul.sources .lang { margin-left:auto; font-size:12px; color:#9a9aa2; text-transform:uppercase;
        background:#222228; border-radius:999px; padding:2px 9px; }
      ul.sources .dot { width:9px; height:9px; border-radius:50%; background:#8a7cf0; flex:0 0 auto; }
      .muted { color:#9a9aa2; font-size:13px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>manga-utils <span class="accent">web</span></h1>
      <p>The backend is running. The React frontend isn't built yet — this is a placeholder.</p>
      <p>Installed sources: <span id="status">…</span></p>
      <ul class="sources" id="list"></ul>
    </div>
    <script>
      fetch('/api/sources')
        .then(r => r.json())
        .then(d => {
          document.getElementById('status').innerHTML = '<span class="ok">OK — ' + d.length + ' source(s)</span>';
          const ul = document.getElementById('list');
          ul.innerHTML = '';
          d.forEach(s => {
            const li = document.createElement('li');
            li.innerHTML = '<span class="dot"></span><span class="name"></span><span class="lang"></span>';
            li.querySelector('.name').textContent = s.name;
            li.querySelector('.lang').textContent = s.lang;
            ul.appendChild(li);
          });
          if (!d.length) ul.innerHTML = '<li class="muted">No sources installed yet.</li>';
        })
        .catch(e => {
          document.getElementById('status').innerHTML = '<span class="err">failed</span>';
          document.getElementById('list').innerHTML = '<li class="err">' + String(e) + '</li>';
        });
    </script>
  </body>
</html>
