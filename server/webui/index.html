<html lang="en">

    <meta charset="utf-8" />

    <meta name="theme-color" content="#0e0e10" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />

    <meta name="apple-mobile-web-app-title" content="manga-utils" />
    <title>manga-utils</title>
    <!-- Apply the saved colour theme before first paint so there's no flash of the default theme. -->
    <script>try{var t=localStorage.getItem('app.theme');if(t&&t!=='default')document.documentElement.setAttribute('data-theme',t);}catch(e){}</script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
