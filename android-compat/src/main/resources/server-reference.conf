# Minimal server config the vendored ConfigManager expects. Suwayomi's full
# server-reference.conf is generated by its server-config module, which we don't vendor;
# manga-utils only needs the handful of keys the extension-loading bootstrap reads.
server {
  # Read by xyz.nulldev.ts.config.debugLogsEnabled during ConfigManager.loadConfigs().
  debugLogsEnabled = false
}
